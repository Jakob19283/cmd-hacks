<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shadow Terminal v2</title>
<style>
body {
    margin:0;
    background:black;
    color:#00ff9d;
    font-family: monospace;
}

#terminal {
    padding:20px;
    height:100vh;
    overflow-y:auto;
}

input {
    background:black;
    border:none;
    color:#00ff9d;
    outline:none;
    font-family: monospace;
    width:80%;
}

.line {
    margin:5px 0;
}

.prompt {
    color:#00ff9d;
}

#matrix {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.15;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">
    <div class="line">Shadow Terminal v2 gestartet... tippe <b>help</b></div>
    <div id="output"></div>

    <div class="line">
        <span class="prompt">root@shadow:~$ </span>
        <input id="cmd" autofocus />
    </div>
</div>

<script>
// ---------- MATRIX EFFECT ----------
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01HACKSHADOWTERMINAL@@##$$%%&&";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff9d";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++) {
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(drawMatrix, 40);

// ---------- TERMINAL LOGIC ----------
const input = document.getElementById("cmd");
const output = document.getElementById("output");

function print(text) {
    output.innerHTML += "<div class='line'>" + text + "</div>";
    window.scrollTo(0, document.body.scrollHeight);
}

function cowsay(msg) {
    let line = "_".repeat(msg.length);
    return `
<pre>
 ${line}
< ${msg} >
 ${"-".repeat(msg.length)}
        \\   ^__^
         \\  (oo)\\_______
            (__)\\       )\\/\\
                ||----w |
                ||     ||
</pre>`;
}

function handle(cmd) {
    print("<span style='color:#666'>root@shadow:~$</span> " + cmd);

    switch(cmd.toLowerCase()) {

        case "help":
            print("Commands: help, clear, starwars, cowsay, matrix, neofetch, fortune, colors, hack, animals, secret");
            break;

        case "clear":
            output.innerHTML = "";
            break;

        case "starwars":
            print("Opening Star Wars...");
            window.open("https://www.asciimation.co.nz/", "_blank");
            break;

        case "cowsay":
            print(cowsay("HACK THE SYSTEM"));
            break;

        case "matrix":
            print("Matrix mode already running...");
            break;

        case "neofetch":
            print(`
<pre>
ShadowOS 1.0
CPU: Quantum JS Engine
RAM: Unlimited imagination
Kernel: Browser-based illusion
Uptime: 99 years (felt)
</pre>`);
            break;

        case "fortune":
            let quotes = [
                "Hack the planet.",
                "There is no spoon.",
                "Reality is optional.",
                "You are inside the simulation.",
                "01010100 01001111 01001111 01010010"
            ];
            print(quotes[Math.floor(Math.random()*quotes.length)]);
            break;

        case "colors":
            document.body.style.color =
                "#" + Math.floor(Math.random()*16777215).toString(16);
            print("Color changed.");
            break;

        case "hack":
            print("Breaching firewall...");
            let i = 0;
            let interval = setInterval(()=>{
                print("Bypassing layer " + i);
                i++;
                if(i > 5) {
                    clearInterval(interval);
                    print("ACCESS GRANTED ✔");
                }
            }, 400);
            break;

        case "animals":
            let animals = ["🐱 cat", "🐶 dog", "🦊 fox", "🐸 frog", "🐼 panda"];
            print(animals[Math.floor(Math.random()*animals.length)]);
            break;

        case "secret":
            print("You found the hidden protocol: /shadow/unlock");
            document.body.style.background = "#001100";
            break;

        default:
            print("Command not found. Try 'help'");
    }
}

input.addEventListener("keydown", function(e){
    if(e.key === "Enter") {
        handle(input.value);
        input.value = "";
    }
});
</script>

</body>
</html>
